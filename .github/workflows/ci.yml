name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev gnupg
      - name: Validate apt repository
        run: bin/validate-repo.sh
